<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment Confirmation - Waste Marketplace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f0fdf4; 
            background-image: linear-gradient(to bottom right, #f0fdf4, #ecfeff);
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .fade-in { animation: fadeIn 0.5s ease-out; }
    </style>
</head>
<body class="antialiased text-gray-800 flex items-center justify-center min-h-screen p-4">

    <div class="main-card max-w-lg mx-auto bg-white/80 backdrop-blur-sm p-8 rounded-xl shadow-lg text-center fade-in">
        
        <div class="text-8xl mb-6">🎉</div>
        
        <h1 class="text-3xl font-bold text-gray-900 mb-4">Payment Successful!</h1>
        
        <p class="text-gray-600 mb-8">
            Thank you for your order. Your transaction will be reviewed, and your product submission will be processed shortly.
        </p>
        
        <a href="index.html" class="inline-block w-full bg-teal-600 text-white py-3 px-6 rounded-lg font-semibold text-lg hover:bg-teal-700 transition">
            &larr; Back to Dashboard
        </a>
        
    </div>

</body>
</html>
